<m-group>
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ARCADE3 — WHEP Streaming Cabinet  (Wario Land SNES 2.0)

       Key differences from arcade-wario.html (postMessage attempt):
         • <m-video src="whep://..."> replaces <m-image> frame swaps
         • WebRTC/UDP replaces JPEG/TCP — ~30-80ms vs ~200-500ms
         • Audio travels inside the same WebRTC peer connection
         • Input WS connects to /input path (not MML doc path)
         • Session ID links input WebSocket to WHEP video stream
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

  <m-model
    src="https://raw.githubusercontent.com/jdunk4/ARCADE1/main/MODELS/ArcadeMachineFinal.glb"
    y="0" scale="1">
  </m-model>

  <!-- Static preview — hidden when game is live, shown when idle -->
  <m-image
    id="screen-preview"
    src="https://raw.githubusercontent.com/jdunk4/ARCADE1/main/SCREEN/Warioland!.png"
    width="1.75" height="1.25"
    y="2.69" z="0.626" rx="-18">
  </m-image>

  <!-- Live game video — WebRTC stream from server via WHEP -->
  <!-- src is set dynamically once the server signals session_ready -->
  <!-- onclick fires in the MML client (not SES) — this is what unlocks audio -->
  <m-video
    id="screen-video"
    src=""
    width="1.75" height="1.25"
    y="2.69" z="0.627" rx="-18"
    visible="false"
    loop="false"
    volume="1"
    emissive="1"
    onclick="this.setAttribute('volume','1')">
  </m-video>

  <!-- Cabinet labels -->
  <m-label
    content="WARIO LAND"
    y="0.65" z="0.38"
    width="0.9" height="0.1"
    font-size="10" color="#ffcc00" alignment="center">
  </m-label>

  <m-label
    id="completion-label"
    content="0 players completed"
    y="0.52" z="0.38"
    width="0.9" height="0.1"
    font-size="10" color="#aaaaff" alignment="center">
  </m-label>

  <m-label
    id="status-label"
    content=""
    y="0.38" z="0.38"
    width="0.85" height="0.12"
    font-size="11" color="#ffff00" alignment="center">
  </m-label>

  <!-- Info card -->
  <m-image
    id="info-card"
    src="https://raw.githubusercontent.com/jdunk4/ARCADE1/main/INFOCARDs/info-card-j.png"
    width="1.4" height="2.23"
    x="1.9" y="2.2" z="1.2" ry="-15"
    visible="false">
  </m-image>

  <m-position-probe range="6.0" id="probe"></m-position-probe>

  <!-- Silent audio trigger — playing any m-audio resumes Three.js AudioContext,
       which causes m-video to unmute itself (see ThreeJSVideo.syncVideoTime).
       We play this 1-frame silent audio on E press to unlock the audio graph. -->
  <m-audio
    id="audio-unlock"
    src="https://public.mml.io/piano.mp3"
    loop="false"
    volume="0"
    enabled="false"
    visible="false">
  </m-audio>

  <m-interaction
    id="play-btn"
    prompt="Press E to Play Wario Land SNES 2.0"
    range="4.0" y="1.1">
  </m-interaction>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTROLLER — SNES pad (identical to ARCADE2)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <m-group id="controller-root" y="0.9" z="0.55">
    <m-cube width="0.9" height="0.18" depth="0.42" color="#1a0505" rx="8"></m-cube>
    <m-cube x="-0.38" y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <m-cube x="0.38"  y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <m-cube id="btn-dpad-up"    x="-0.3"  y="0.095" z="-0.04" width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-down"  x="-0.3"  y="0.095" z="0.06"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-left"  x="-0.36" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-right" x="-0.24" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-sphere id="btn-a"      x="0.36" y="0.11" z="0.0"   radius="0.038" color="#cc2222"></m-sphere>
    <m-sphere id="btn-b"      x="0.30" y="0.11" z="0.06"  radius="0.038" color="#1aaa5c"></m-sphere>
    <m-sphere id="btn-x"      x="0.3"  y="0.11" z="-0.06" radius="0.038" color="#2244cc"></m-sphere>
    <m-sphere id="btn-y"      x="0.24" y="0.11" z="0.0"   radius="0.038" color="#ccaa00"></m-sphere>
    <m-cube id="btn-lb" x="-0.38" y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-rb" x="0.38"  y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-lt" x="-0.38" y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <m-cube id="btn-rt" x="0.38"  y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <m-sphere id="btn-select" x="-0.1" y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <m-sphere id="btn-start"  x="0.1"  y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <m-sphere id="btn-ls"     x="-0.18" y="0.1" z="0.06" radius="0.055" color="#2a2a4a"></m-sphere>
    <m-sphere id="btn-rs"     x="0.18"  y="0.1" z="0.08" radius="0.055" color="#2a2a4a"></m-sphere>
  </m-group>

  <script>
  (function(root) {

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONFIG — update SNES_SERVER_WS to your Railway domain
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var ROM_FILE         = "Wario Land SNES 2.0.sfc";
    var ROM_CORE         = "snes";
    var ROM_ID           = "wario-land-snes-2";
    var ROM_TITLE        = "Wario Land SNES 2.0";
    var ROM_PREVIEW      = "https://raw.githubusercontent.com/jdunk4/ARCADE3/main/SCREEN/wario-land-preview.png";
    var SNES_SERVER_WS   = "wss://arcade3-production.up.railway.app";   // ← update after deploy
    var BACKEND_SERVER   = "https://gamer-production.up.railway.app";
    var WALLET           = "anonymous";

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HELPERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function set(id, attr, val) {
      var e = root.querySelector("#" + id);
      if (e) e.setAttribute(attr, val);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // STATE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var socket        = null;
    var gameActive    = false;
    var pollingActive = false;
    var sessionId     = null;

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // AUDIO — ARCADE2's proven pattern: new Audio() + MediaSource
    // Completely bypasses Three.js AudioContext restrictions.
    // Server sends Opus/WebM chunks over WebSocket → we buffer
    // them into a MediaSource → Audio element plays them.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var audioEl = null, mediaSource = null, sourceBuffer = null, audioObjectURL = null;
    var audioChunkQueue = [], sbReady = false, audioInitialized = false, audioEnabled = false;

    function initAudio() {
      if (audioInitialized) return;
      audioInitialized = true;
      try {
        if (!window.MediaSource) {
          set("completion-label", "content", "Audio: no MediaSource");
          return;
        }
        audioEl = new Audio();
        audioEl.autoplay = true;
        mediaSource = new MediaSource();
        audioObjectURL = URL.createObjectURL(mediaSource);
        audioEl.src = audioObjectURL;
        set("completion-label", "content", "Audio: init OK");
        mediaSource.addEventListener("sourceopen", function() {
          try {
            sourceBuffer = mediaSource.addSourceBuffer('audio/webm; codecs="opus"');
            sourceBuffer.mode = "sequence";
            sbReady = true;
            set("completion-label", "content", "Audio: ready!");
            flushAudioQueue();
          } catch(e) { set("completion-label", "content", "SB err: " + e.message.slice(0,25)); }
        });
      } catch(e) { set("completion-label", "content", "Audio err: " + e.message.slice(0,25)); }
    }

    var MAX_AUDIO_QUEUE = 3;
    function flushAudioQueue() {
      if (!audioEnabled) { audioChunkQueue = []; return; }
      if (!sbReady || !sourceBuffer || sourceBuffer.updating || audioChunkQueue.length === 0) return;
      while (audioChunkQueue.length > MAX_AUDIO_QUEUE) audioChunkQueue.shift();
      var chunk = audioChunkQueue.shift();
      try { sourceBuffer.appendBuffer(chunk); } catch(e) { audioChunkQueue = []; return; }
      sourceBuffer.addEventListener("updateend", function onUpdate() {
        sourceBuffer.removeEventListener("updateend", onUpdate);
        flushAudioQueue();
      });
    }

    function playAudioChunk(base64Data) {
      if (!audioEnabled || !audioEl || !mediaSource) return;
      try {
        var binary = atob(base64Data);
        var buf = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) buf[i] = binary.charCodeAt(i);
        audioChunkQueue.push(buf.buffer);
        flushAudioQueue();
      } catch(e) {}
    }

    function unlockAudio() {
      resumeAudio();
    }

    function resumeAudio() {
      if (!audioEnabled) return;
      if (!audioInitialized) initAudio();
      if (audioEl && audioEl.paused) audioEl.play().catch(function(e) {
        set("completion-label", "content", "Play err: " + e.message.slice(0,20));
      });
    }

    function resetAudio() {
      audioEnabled = false; audioChunkQueue = []; sbReady = false; audioInitialized = false;
      if (audioEl) { try { audioEl.pause(); audioEl.src = ""; } catch(e) {} }
      if (audioObjectURL) { try { URL.revokeObjectURL(audioObjectURL); } catch(e) {} audioObjectURL = null; }
      audioEl = null; mediaSource = null; sourceBuffer = null;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONTROLLER — identical button maps to ARCADE2
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var gamepadToSNES = {
      0:"b",1:"a",2:"y",3:"x",4:"l",5:"r",
      8:"select",9:"start",12:"up",13:"down",14:"left",15:"right"
    };
    var buttonMap = {
      0:{id:"btn-a",         color:"#ff5555",pressY:0.095},
      1:{id:"btn-b",         color:"#44ff88",pressY:0.095},
      2:{id:"btn-x",         color:"#5588ff",pressY:0.095},
      3:{id:"btn-y",         color:"#ffee44",pressY:0.095},
      4:{id:"btn-lb",        color:"#8877ff",pressY:0.10},
      5:{id:"btn-rb",        color:"#8877ff",pressY:0.10},
      6:{id:"btn-lt",        color:"#ff8844",pressY:0.14},
      7:{id:"btn-rt",        color:"#ff8844",pressY:0.14},
      8:{id:"btn-select",    color:"#aaaaff",pressY:0.085},
      9:{id:"btn-start",     color:"#aaaaff",pressY:0.085},
      10:{id:"btn-ls",       color:"#66ddff",pressY:0.085},
      11:{id:"btn-rs",       color:"#66ddff",pressY:0.085},
      12:{id:"btn-dpad-up",  color:"#ffffff",pressY:0.08},
      13:{id:"btn-dpad-down",color:"#ffffff",pressY:0.08},
      14:{id:"btn-dpad-left",color:"#ffffff",pressY:0.08},
      15:{id:"btn-dpad-right",color:"#ffffff",pressY:0.08}
    };
    var defaultColors = {
      0:"#cc2222",1:"#1aaa5c",2:"#2244cc",3:"#ccaa00",
      4:"#2a2a4a",5:"#2a2a4a",6:"#2a2a4a",7:"#2a2a4a",
      8:"#3a3a5c",9:"#3a3a5c",10:"#2a2a4a",11:"#2a2a4a",
      12:"#3a3a5c",13:"#3a3a5c",14:"#3a3a5c",15:"#3a3a5c"
    };
    var defaultY = {
      0:0.11,1:0.11,2:0.11,3:0.11,4:0.12,5:0.12,6:0.16,7:0.16,
      8:0.1,9:0.1,10:0.1,11:0.1,12:0.095,13:0.095,14:0.095,15:0.095
    };
    var remapIndex = {
      0:1,1:0,2:3,3:2,4:4,5:5,6:6,7:7,
      8:8,9:9,10:10,11:11,12:12,13:13,14:14,15:15
    };
    var buttonStates = {};

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // INPUT — send keyDown/keyUp over the input WebSocket
    // (server forwards to Puppeteer page.keyboard.down/up)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function sendGameInput(key, type) {
      if (!gameActive || !socket || socket.readyState !== 1) return;
      socket.send(JSON.stringify({ type: type, key: key }));
    }

    function setButtonPressed(rawIndex, di, pressed) {
      var map = buttonMap[di];
      if (!map) return;
      var elem = root.querySelector("#" + map.id);
      if (!elem) return;
      if (pressed && !buttonStates[di]) {
        buttonStates[di] = true;
        elem.setAttribute("color", map.color);
        elem.setAttribute("y", map.pressY);
        var k = gamepadToSNES[rawIndex];
        if (k) sendGameInput(k, "keyDown");
        // Button press = potential user gesture — try to resume audio
        resumeAudio();
      } else if (!pressed && buttonStates[di]) {
        buttonStates[di] = false;
        elem.setAttribute("color", defaultColors[di] || "#3a3a5c");
        elem.setAttribute("y", defaultY[di]);
        var k = gamepadToSNES[rawIndex];
        if (k) sendGameInput(k, "keyUp");
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GAMEPAD POLLING (unchanged from ARCADE2)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function getBestGamepad() {
      var gps = navigator.getGamepads ? navigator.getGamepads() : [];
      for (var i = 0; i < gps.length; i++) if (gps[i] && gps[i].mapping === "standard") return gps[i];
      for (var j = 0; j < gps.length; j++) if (gps[j]) return gps[j];
      return null;
    }

    function poll() {
      if (pollingActive) return;
      pollingActive = true;
      function loop() {
        var gp = getBestGamepad();
        if (gp) {
          gp.buttons.forEach(function(btn, rawIndex) {
            var di = remapIndex.hasOwnProperty(rawIndex) ? remapIndex[rawIndex] : rawIndex;
            setButtonPressed(rawIndex, di, btn.pressed || btn.value > 0.5);
          });
          var axisX = gp.axes[0]||0, axisY = gp.axes[1]||0, T = 0.5;
          var ls = root.querySelector("#btn-ls"), rs = root.querySelector("#btn-rs");
          if (ls) { ls.setAttribute("x", -0.18 + axisX*0.04); ls.setAttribute("z", 0.06 + axisY*0.04); }
          if (rs) { rs.setAttribute("x", 0.18 + (gp.axes[2]||0)*0.04); rs.setAttribute("z", 0.08 + (gp.axes[3]||0)*0.04); }
          if (!buttonStates[14] && !buttonStates[15] && !buttonStates[12] && !buttonStates[13]) {
            if      (axisX < -T) sendGameInput("left","keyDown");
            else if (axisX >  T) sendGameInput("right","keyDown");
            else { sendGameInput("left","keyUp"); sendGameInput("right","keyUp"); }
            if      (axisY < -T) sendGameInput("up","keyDown");
            else if (axisY >  T) sendGameInput("down","keyDown");
            else { sendGameInput("up","keyUp"); sendGameInput("down","keyUp"); }
          }
        }
        requestAnimationFrame(loop);
      }
      loop();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GAME LAUNCH
    //
    // 1. Open input WebSocket to /input?rom=...&session=SESSION_ID
    // 2. Server starts Puppeteer, replies { type:"session_ready", whepUrl }
    // 3. We set <m-video src="whep://..."> — MML starts WebRTC handshake
    // 4. Video appears on cabinet screen in ~1-2s
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function launchGame() {
      sessionId = Math.random().toString(36).slice(2);
      resetAudio(); audioEnabled = true; initAudio();
      // NOTE: Connect to ROOT path (/) not /input — Railway's proxy only
      // upgrades WebSockets on the root path. We distinguish input vs MML
      // doc connections using the ?session= query param server-side.
      var wsUrl = SNES_SERVER_WS
        + "?rom="     + encodeURIComponent(ROM_FILE)
        + "&core="    + encodeURIComponent(ROM_CORE)
        + "&id="      + encodeURIComponent(ROM_ID)
        + "&session=" + sessionId
        + "&wallet="  + encodeURIComponent(WALLET);

      socket = new WebSocket(wsUrl);

      socket.onopen = function() {
        set("status-label", "content", "Launching...");
        set("play-btn", "prompt", "Loading...");
      };

      socket.onmessage = function(msg) {
        try {
          var frame = JSON.parse(msg.data);

          // ── Session ready → point <m-video> at WHEP stream ──
          if (frame.type === "session_ready" && frame.whepUrl) {
            // Replace server hostname placeholder with actual server host
            var whepSrc = frame.whepUrl.replace(
              "ARCADE3_SERVER_HOST",
              SNES_SERVER_WS.replace("wss://","").replace("ws://","")
            );
            set("screen-video", "src",     whepSrc);
            set("screen-video", "visible", "true");
            set("screen-preview","visible","false");
            set("status-label", "content", "");
            set("play-btn",     "prompt",  "Press E to Close");
            gameActive = true;
            return;
          }

          if (frame.type === "audio" && frame.data) { playAudioChunk(frame.data); return; }
          if (frame.type === "status")  { set("status-label","content", frame.message); return; }
          if (frame.type === "error")   { set("status-label","content", "Error: " + frame.message); return; }
          if (frame.type === "completion") { logCompletion(); return; }

        } catch(e) {}
      };

      socket.onclose = function() {
        closeGame();
      };

      socket.onerror = function() {
        set("status-label","content","Connection failed");
        socket.close();
      };
    }

    function closeGame() {
      gameActive = false;
      if (socket) { try { socket.close(); } catch(e) {} socket = null; }
      resetAudio();
      set("screen-video",   "src",     "");
      set("screen-video",   "visible", "false");
      set("screen-preview", "visible", "true");
      set("status-label",   "content", "");
      set("play-btn",       "prompt",  "Press E to Play " + ROM_TITLE);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // COMPLETION TRACKING
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function logCompletion() {
      fetch(BACKEND_SERVER + "/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wallet: WALLET, rom: ROM_ID })
      }).then(function() { refreshCompletionCount(); }).catch(function(){});
    }

    function refreshCompletionCount() {
      fetch(BACKEND_SERVER + "/completions/" + ROM_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var count = data.count || 0;
          set("completion-label","content",
            count + " player" + (count !== 1 ? "s" : "") + " completed");
        }).catch(function(){});
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BOOT
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    setTimeout(function() {
      poll();
      window.addEventListener("gamepadconnected", function() { if (!pollingActive) poll(); });

      var playBtn = root.querySelector("#play-btn");
      if (playBtn) playBtn.addEventListener("interact", function() {
        unlockAudio();
        if (gameActive) closeGame(); else launchGame();
      });

      var probe = root.querySelector("#probe");
      if (probe) {
        probe.addEventListener("positionenter", function() { set("info-card","visible","true"); });
        probe.addEventListener("positionleave", function() {
          set("info-card","visible","false");
          if (gameActive) closeGame();
        });
      }

      refreshCompletionCount();
    }, 500);

  })(document.currentScript ? document.currentScript.closest("m-group") : document);
  </script>
</m-group>
